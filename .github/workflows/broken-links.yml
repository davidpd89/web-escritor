name: Check for broken links

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check links in HTML files
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --exclude 'amazon\.es'
            --exclude 'amazon\.com'
            --exclude 'goodreads\.com'
            --exclude 'instagram\.com'
            --exclude 'linkedin\.com'
            --exclude 'twitter\.com'
            --exclude 'libreriale\.es'
            --exclude 'bookish\.org'
            --exclude 'libreriaserendipia\.com'
            --exclude 'hoymadrid\.app'
            './**/*.html'
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: broken-links-report
          path: lychee/out.md
          retention-days: 30

      - name: Warn if broken links found
        if: steps.lychee.outputs.exit_code != '0'
        run: |
          echo "::warning::Found broken links. Check the uploaded artifact for details."
