name: Update sitemap lastmod selectively

on:
  push:
    branches: [main]
    paths:
      - '**.html'

permissions:
  contents: write

jobs:
  update-sitemap-dates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed HTML files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.html' | tr '\n' ' ')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed HTML files: $CHANGED"

      - name: Update sitemap lastmod for changed pages only
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          for file in $CHANGED_FILES; do
            # Convert file path to canonical URL
            if [ "$file" = "index.html" ]; then
              url="https://davidportodiaz.com/"
            elif [[ "$file" == */index.html ]]; then
              dir=$(dirname "$file")
              url="https://davidportodiaz.com/$dir/"
            else
              url="https://davidportodiaz.com/$file"
            fi
            echo "Updating lastmod for: $url → $TODAY"
            # Escape dots in URL for sed regex, use | as delimiter to avoid escaping slashes
            ESCAPED=$(printf '%s' "$url" | sed 's/\./\\./g')
            # <loc> and <lastmod> are on consecutive lines in our sitemap
            sed -i "\|<loc>${ESCAPED}</loc>|{n; s|<lastmod>[0-9-]*</lastmod>|<lastmod>${TODAY}</lastmod>|}" sitemap.xml
            echo "Done: $url"
          done

      - name: Commit updated sitemap if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet sitemap.xml; then
            git add sitemap.xml
            git commit -m "ci: update sitemap lastmod for changed pages [$(date -u +%Y-%m-%d)]"
            git push origin HEAD:main
          else
            echo "No sitemap changes needed."
          fi
